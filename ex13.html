<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let noIntervalo = 0

        for (let i = 0; i <10; i++) {

            let n = parseInt(prompt("Digite um número: "))

            if (n >= 10 && n<=50)
            noIntervalo++
        }
        alert("Os números no intervalo são: " + noIntervalo)
    </script>
</body>
</html>
