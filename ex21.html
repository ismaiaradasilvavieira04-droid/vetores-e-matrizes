<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
         let matriz = []
         let soma = 0

        for(let l = 0; l < 4; l++){
            matriz [l] = []
            for (let c = 0; c < 4; c++) {
                matriz[l][c] = parseInt(prompt("Digite um valor para [${l}] [${c}]"))

                soma += matriz[l][c]

            }
        }

          
        media = soma / 16

        alert("a média da sua matriz 4x4 é \n" + media);
    </script>
</body>
</html>
