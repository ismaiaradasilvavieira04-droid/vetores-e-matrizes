<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
            let matriz = []
            let resultado = "";
            
            for(let l = 0; l < 4; l++){
                matriz [l] = []
                for (let c = 0; c < 4; c++) {
                    matriz[l][c] = parseInt(prompt("Digite um valor para [${l}] [${c}]"))
       
                }
            }

            for (let l = 0; l <4; l++){
                let maiorLinha = matriz[l][0]

               for(let c = 0; c < 4; c++){
                if(matriz[l][c] > maiorLinha){
                 maiorLinha = matriz[l][c]
                 }
              }
              resultado += "Linha" + l + ":" + maiorLinha + "\n"
            }
            alert("Os maiores valores de cada linha são:\n " + resultado)

    </script>
</body>
</html>
