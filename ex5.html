<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let maior = 0
        let menor = 0

        for (let i = 0; i <5; i++) {
            let n = parseInt(prompt("digite um número: "))

            if (i == 0) {

                maior = n;
                menor = n;
            } else {
                if(n > maior) {
                    maior = n;
                }
                if( n < menor) {
                    menor = n
                }
            }
        }

        alert("O maior é: " + maior);
        alert("O menor é: " + menor);

    </script>
</body>
</html>
