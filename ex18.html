<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let somaDiagonal = 0;
        let matriz = []

        for(let l = 0; l < 3; l++){
            somaDiagonal += matriz[l][l]
        }
        alert("sua matriz 3x3 na diagonal é \n" + somaDiagonal);

    </script>
</body>
</html>
