<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let matriz = []
        

          for(let l = 0; l < 4; l++){
            matriz [l] = []
            for (let c = 0; c < 4; c++) {
                matriz[l][c] = parseInt(prompt("Digite um valor para [${l}] [${c}]"))

            }
        }

        for (let c = 0; c <4; c++){
        let somaColuna = 0

            for(let l = 0; l < 4; l++){
                somaColuna += matriz[l][c]
            }
             alert("A soma da coluna ${c} é  ${somaColuna}");
        }

    </script>
</body>
</html>
