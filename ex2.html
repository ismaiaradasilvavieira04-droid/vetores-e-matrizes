<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes
</title>
</head>
<body>
    <script>
        let soma = 0 

        for (let i = 0; i < 10; i++) {
            let n = parseInt(prompt("Digite um número"))

            soma += n;
        }

        alert("A soma dos números digitados é: " + soma)
    </script>
</body>
</html>
