<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let soma = 0

        for (let i = 0; i < 7; i++) {
            let n = parseInt(prompt("Digite um número: "))

            soma += n

        }

         media = soma / 7

        alert("A média dos números é: " + media)
    </script>
</body>
</html>
