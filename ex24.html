<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let matriz = []
        let simetrica = true

          for(let l = 0; l < 3; l++){
            matriz [l] = []
            for (let c = 0; c < 3; c++) {
                matriz[l][c] = parseInt(prompt("Digite um valor para [${l}] [${c}]"))

               
            }
        }

        for(let l = 0; l < 3; l++){
            for (let c = 0; c < 3; c++){
                
                if (matriz[l][c] !== matriz[c][l]){
                    simetrica = false
                }
            }
        }

        if(simetrica){
            alert("A matriz é simétrica")
        }else {
            alert("A matriz não é simétrica")
        }

    </script>
</body>
</html>
