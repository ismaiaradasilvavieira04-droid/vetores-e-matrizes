<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let matriz = []
        let identidade = true

        for(let l = 0; l < 3; l++){
            matriz [l] = []
            for (let c = 0; c < 3; c++) {
                matriz[l][c] = parseInt(prompt("Digite um valor para [${l}] [${c}]"))
                
                if ((l == c && matriz[l][c] != 1) || (l != c && matriz[l][c] != 0)) {
                     identidade = false;
                 }
            }
            
        }

        alert("É uma matriz identidade? " + identidade)
    </script>
</body>
</html>
