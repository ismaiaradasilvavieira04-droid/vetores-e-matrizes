<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let numeros = []

        for (let i = 0; i <5; i++) {
            let n = parseInt(prompt("DIgite um número: "))
            numeros.push(n);

        }

        numeros.reverse();

        alert("Os números ao contrário são: "+ numeros);
    </script>
</body>
</html>
