<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
         let nomes = []

            for (let i = 0; i <5; i++) {
                let n = (prompt("digite um nome"))

                nomes.push(n)
            }

            nomes.sort();

            alert("Os nomes em ordem alfabética ficam " + nomes)
    </script>
</body>
</html>
