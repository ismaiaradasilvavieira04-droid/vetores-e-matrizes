<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let matriz = []
        let menor = 0
       

        for(let l = 0; l < 3; l++){
            matriz [l] = []
            for (let c = 0; c < 3; c++) {
                matriz[l][c] = parseInt(prompt("Digite um valor para [${l}] [${c}]"))

                        if (l == 0 && c == 0) {

                        menor = matriz[l][c];
                    
                    } else {
                        if(matriz[l][c] < menor) {
                            menor = matriz[l][c];
                        }
                    }

            }
        }

        let resultado = '';

       resultado += menor;

       alert("O menor valor presente na matriz é " + menor)
    </script>
</body>
</html>
