<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let positivo = 0
        let negativo = 0

        for (let i = 0; i <10; i++) {
            let n = parseInt(prompt("digite um número: "))

            if ( n > 0){
            
            positivo++
            
            }else if (n < 0) {
                negativo++
            }
            
        }

        alert("a quantidade de números positivos é: " + positivo)
        alert("a quantidade de números negativos é: " + negativo)
    </script>
</body>
</html>
