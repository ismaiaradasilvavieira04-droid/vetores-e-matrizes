<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vetores e matrizes</title>
</head>
<body>
    <script>
        let pares = [];

        for (let i = 0; i < 7; i++){
            let n =parseInt(prompt("digite um número: "))

            if ( n % 2 == 0) {

             pares.push(n);
            }
        }
        
        alert("os números pares são " + pares)
    </script>
</body>
</html>
